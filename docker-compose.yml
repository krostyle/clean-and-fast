version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    container_name: clean-and-fast-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cleanfast
      POSTGRES_PASSWORD: cleanfast123
      POSTGRES_DB: cleanfast
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
